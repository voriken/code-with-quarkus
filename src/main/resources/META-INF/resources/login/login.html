<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/main.css">
    <script src="/js/toggle.js" defer></script>
</head>

<body>

    <!-- 네비바 → index.html과 동일하게 복사 -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">리그오브레전드</a>
            <!-- [추가] 다크/라이트 토글 버튼 -->
            <button class="btn border-0" id="themeToggleBtn" onclick="toggleTheme()">🌙 DARK</button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/">메인화면</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">뉴스</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">챔피언</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/main_page_sub/download.html">다운로드</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/login">로그인</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            외부사이트
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">League Of Legend Official</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero d-flex align-items-center justify-content-center text-center py-5">
        <div class="container" style="max-width: 400px;">
            <h2 class="fw-bold mb-4">로그인</h2>

            <form method="POST" action="/login_check">
                <div class="mb-3 text-start">
                    <label class="form-label">아이디</label>
                    <input type="text" class="form-control"
                           name="username" placeholder="아이디 입력" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label">패스워드</label>
                    <input type="password" class="form-control"
                           name="password" placeholder="패스워드 입력" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">로그인</button>
            </form>

            <script>
                const params = new URLSearchParams(window.location.search);
                if (params.get('error') === '1') {
                    document.write('<div class="alert alert-danger mt-3">아이디 또는 패스워드가 올바르지 않습니다.</div>');
                }
            </script>
        </div>
    </section>

</body>

</html>
