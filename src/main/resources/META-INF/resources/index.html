<!DOCTYPE html> <!-- 주석은 이렇게 입력! -->
<html lang="ko">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>LOL - 1단계</title>
    <style>
        body {
            background-color: #0a0e17;
            color: #fff;
        }

        .accent-purple {
            color: #a020f0;
        }

        .card {
            background-color: #1e1e1e;
            border: none;
            color: white;
        }

        .btn-primary {
            background-color: #a020f0;
            border: none;
        }

        .card {
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            /* 마우스를올리면커짐*/
            box-shadow: 0 10px 20px rgba(160, 32, 240, 0.5);
            /* 보라색광원효과*/
        }

        .card-img-top {
            object-fit: cover;
            /* 이미지가찌그러지지않게채움*/
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid"><a class="navbar-brand" href="#">League of Legends</a></div>
    </nav>
    <h1>League of Legends</h1>
    <p>적의 넥서스를 파괴하세요! 5v5 MOBA 전투에서 팀과 함께 승리하세요.</p>

    <h2>챔피언 선택</h2>
    <ul>
        <li>Aatrox (탑) - 어둠의 검으로 적을 베세요.</li>
        <li>Sylas (정글/미드) - 궁극기를 훔치세요!</li>
    </ul>
    <h2>최신 뉴스</h2>
    <div>
        <h3>새로운 챔피언 출시</h3>
        <p>2026 루나 레벨 이벤트!</p>
    </div>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Aatrox.png"
                        class="card-img-top">
                    <div class="card-body">
                        <h5>Aatrox</h5>
                        <p>어둠의검으로적을베세요.</p>
                        <h2 class="text-center accent-purple">챔피언선택</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
