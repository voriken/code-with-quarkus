<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <!-- 반응형 뷰포트 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 페이지 제목 -->
    <title>다운로드</title>
    <!-- 부트스트랩 CSS 로드 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 부트스트랩 JS 번들 로드 -->
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/test.js"></script>
    <style>
        /* 기본 바디 스타일 */
        body {
            background-color: #0a0e17;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
        }

        /* 네비게이션 바 배경 */
        .navbar {
            background-color: #000;
        }

        /* 강조 색상(보라) */
        .accent-purple {
            color: #a020f0;
        }

        /* 강조 색상(빨강) */
        .accent-red {
            color: #ff0000;
        }

        /* 카드 기본 스타일 */
        .card {
            background-color: #1e1e1e;
            border: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        /* 카드 호버 효과 */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(160, 32, 240, 0.5);
        }

        /* 카드 이미지 크기 */
        .card-img-top {
            height: 200px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }

        /* 기본 버튼 색상 */
        .btn-primary {
            background-color: #a020f0;
            border: none;
        }

        /* 기본 버튼 호버 */
        .btn-primary:hover {
            background-color: #800080;
        }

        /* 히어로 섹션 레이아웃 */
        .hero-download {
            position: relative;
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* 히어로 배경 이미지 */
        .hero-download::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Jinx_0.jpg')
                center center / cover no-repeat;
            filter: brightness(0.35);
        }

        /* 히어로 하단 그라디언트 */
        .hero-download::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to top, #0a0e17, transparent);
        }

        /* 히어로 콘텐츠 레이어 */
        .hero-content {
            position: relative;
            z-index: 1;
        }

        /* 히어로 제목 */
        .hero-content h1 {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 2px 20px rgba(0,0,0,0.7);
        }

        /* 히어로 설명 문구 */
        .hero-content p {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 2rem;
        }

        /* 다운로드 버튼 스타일 */
        .btn-download {
            background: linear-gradient(180deg, #c8aa6e, #a0824a);
            color: #0a0e17;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 14px 40px;
            border: none;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        /* 다운로드 버튼 호버 */
        .btn-download:hover {
            background: linear-gradient(180deg, #f0e6d2, #c8aa6e);
            color: #0a0e17;
            box-shadow: 0 0 25px rgba(200, 170, 110, 0.4);
            transform: translateY(-2px);
        }

        /* 맥 버튼 스타일 */
        .btn-mac {
            border: 1px solid rgba(200, 170, 110, 0.5);
            color: #c8aa6e;
            background: transparent;
            padding: 12px 32px;
            border-radius: 3px;
            font-weight: bold;
            transition: all 0.3s;
        }

        /* 맥 버튼 호버 */
        .btn-mac:hover {
            border-color: #c8aa6e;
            color: #f0e6d2;
            background: rgba(200, 170, 110, 0.1);
        }

        /* 다운로드 메타 정보 */
        .download-meta {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>

<body>

    <!-- 상단 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <!-- 브랜드 로고/텍스트 -->
            <a class="navbar-brand" href="#">리그오브레전드</a>
            <!-- 모바일 토글 버튼 -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- 네비게이션 메뉴 -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <!-- 홈 링크 -->
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">리그홈</a>
                    </li>
                    <!-- 뉴스 링크 -->
                    <li class="nav-item">
                        <a class="nav-link" href="#">뉴스</a>
                    </li>
                    <!-- 챔피언 링크 -->
                    <li class="nav-item">
                        <a class="nav-link" href="#">챔피언</a>
                    </li>
                    <!-- 다운로드 링크 -->
                    <li class="nav-item">
                        <a class="nav-link" href="main_page_sub/download.html">다운로드</a>
                    </li>
                    <!-- 로그인 링크 -->
                    <li class="nav-item">
                        <a class="nav-link" href="#">로그인</a>
                    </li>
                    <!-- 외부 사이트 드롭다운 -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            외부사이트
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">League Of Legend Official</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li><a class="dropdown-item" href="#">Something else here</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                    </li>
                </ul>
                <!-- 검색 폼 -->
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- 히어로 배너 (배경 이미지 + 다운로드 버튼) -->
    <section class="hero-download">
        <div class="hero-content">
            <!-- 히어로 타이틀 -->
            <h1>게임 다운로드</h1>
            <!-- 히어로 설명 -->
            <p>지금 바로 리그 오브 레전드를 무료로 플레이하세요!</p>
            <!-- 다운로드 버튼 그룹 -->
            <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center align-items-center">
                <a href="#" class="btn btn-download btn-lg" target="_blank" onclick="alert('즐거운 플레이 되세요')">
                    Windows 다운로드
                </a>
                <a href="#" class="btn btn-mac btn-lg" target="_blank">
                    Mac 다운로드
                </a>
            </div>
            <!-- 다운로드 용량 안내 -->
            <p class="download-meta">무료 플레이 &middot; 약 8.2 GB</p>
        </div>
    </section>
</body>

</html>
